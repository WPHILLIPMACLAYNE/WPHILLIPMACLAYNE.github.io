    <text x="486" y="440" fill="#a7f3d0" font-size="22" font-weight="700">NPS</text>
    <text x="486" y="503" fill="#ecfeff" font-size="52" font-weight="800">92%</text>
    <text x="828" y="440" fill="#a7f3d0" font-size="22" font-weight="700">PENDÊNCIAS</text>
