<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">WPM Gestão Interna cover</title>
  <desc id="desc">Console operacional com cards de atendimento, NPS, escala e passagem de turno.</desc>
  <rect width="1200" height="900" fill="#050816"/>
  <rect x="72" y="72" width="1056" height="756" rx="32" fill="#0b1020" stroke="#10b981" stroke-opacity=".65" stroke-width="3"/>
  <rect x="112" y="116" width="976" height="76" rx="16" fill="#101827"/>
  <circle cx="152" cy="154" r="11" fill="#10b981"/>
  <circle cx="188" cy="154" r="11" fill="#f59e0b"/>
  <circle cx="224" cy="154" r="11" fill="#a78bfa"/>
