  <text x="112" y="260" fill="#ecfeff" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800">Operação de recepção</text>
  <text x="112" y="314" fill="#a7f3d0" font-family="Inter, Arial, sans-serif" font-size="28">Dashboard, pendências, escala e passagem de turno</text>
  <g fill="#111c2d" stroke="#1fce8a" stroke-opacity=".55" stroke-width="2">
    <rect x="112" y="390" width="292" height="156" rx="22"/>
